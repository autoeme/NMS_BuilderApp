

[/Script/EngineSettings.GameMapsSettings]
GameDefaultMap=/Engine/Maps/Templates/OpenWorld

[/Script/Engine.RendererSettings]
r.AllowStaticLighting=False

r.GenerateMeshDistanceFields=True

; Lumen отключён — он грузит GPU и вешает его (DEVICE_HUNG) на этой видеокарте.
; Для билдера базы качество GI не важно, стабильность важнее.
r.DynamicGlobalIlluminationMethod=0

r.ReflectionMethod=2

r.SkinCache.CompileShaders=True

r.RayTracing=False

r.RayTracing.RayTracingProxies.ProjectEnabled=False

; Аппаратный рейтрейсинг отключён: GPU виснет на сборке RT-сцены/RTPSO
; (DXGI_ERROR_DEVICE_HUNG). Lumen при этом работает в программном режиме.
r.Lumen.HardwareRayTracing=0

; Substrate требует DX12/SM6 — выключаем ради совместимости со слабыми ПК.
r.Substrate=False

r.Substrate.ProjectGBufferFormat=0

; Виртуальные карты теней вешают GPU на этой видеокарте
; (DXGI_ERROR_DEVICE_HUNG на Shadow.Virtual.ProcessInvalidationsGPU).
r.Shadow.Virtual.Enable=0

r.DefaultFeature.AutoExposure.ExtendDefaultLuminanceRange=True

r.DefaultFeature.LocalExposure.HighlightContrastScale=0.8

r.DefaultFeature.LocalExposure.ShadowContrastScale=0.8

